# Palantir Ontology Configuration
# Generated by: Ontology Builder Skill
# Object Type: 维修工单 (Vehicle Service Work Order)
# Generated: 2026-03-19

---
objectType:
  apiName: "vehicle_service_work_order"
  displayName: "维修工单"
  pluralDisplayName: "维修工单"
  description: "汽车售后维修服务工单，整合AB系统数据，为技师提供统一APP操作界面"
  icon: "wrench"

  # 主键定义
  primaryKey:
    - "work_order_number"

# ====================
# 1. PROPERTIES (属性)
# ====================
properties:
  # 工单编号 - 唯一标识
  work_order_number:
    displayName: "工单编号"
    dataType:
      type: "string"
    required: true
    constraints:
      - "unique"

  # VIN码 - 车辆唯一识别码
  vin_code:
    displayName: "VIN码"
    dataType:
      type: "string"
    required: true
    constraints:
      - "length: 17"

  # 品牌
  brand:
    displayName: "品牌"
    dataType:
      type: "string"
    required: false

  # 车型
  vehicle_model:
    displayName: "车型"
    dataType:
      type: "string"
    required: true

  # 车牌号
  license_plate:
    displayName: "车牌号"
    dataType:
      type: "string"
    required: false

  # 行驶里程
  mileage:
    displayName: "行驶里程(公里)"
    dataType:
      type: "integer"
    required: false

  # 车主姓名
  owner_name:
    displayName: "车主姓名"
    dataType:
      type: "string"
    required: true

  # 联系电话
  contact_phone:
    displayName: "联系电话"
    dataType:
      type: "string"
    required: true
    constraints:
      - "pattern: ^1[3-9]\\d{9}$"

  # 故障现象
  fault_description:
    displayName: "故障现象"
    dataType:
      type: "string"
    required: true

  # 工单类型
  work_order_type:
    displayName: "工单类型"
    dataType:
      type: "string"
      enum: ["保养", "故障", "事故", "召回"]
    required: true

  # 创建时间
  created_time:
    displayName: "创建时间"
    dataType:
      type: "timestamp"
    required: true

  # 创建人
  created_by:
    displayName: "创建人"
    dataType:
      type: "string"
    required: true

  # 工单状态
  work_order_status:
    displayName: "工单状态"
    dataType:
      type: "string"
      enum: ["待派单", "进行中", "已完工", "已关闭"]
    required: true
    defaultValue: "待派单"

  # 分配的技师
  assigned_technician:
    displayName: "分配的技师"
    dataType:
      type: "string"
    required: false

  # 审核人
  reviewer:
    displayName: "审核人"
    dataType:
      type: "string"
    required: false

  # 派单时间
  dispatch_time:
    displayName: "派单时间"
    dataType:
      type: "timestamp"
    required: false

  # 技师接单时间
  accept_time:
    displayName: "技师接单时间"
    dataType:
      type: "timestamp"
    required: false

  # 到达现场时间(车辆进店时间)
  arrival_time:
    displayName: "车辆进店时间"
    dataType:
      type: "timestamp"
    required: false

  # 开始维修时间
  start_repair_time:
    displayName: "开始维修时间"
    dataType:
      type: "timestamp"
    required: false

  # 完工时间
  completion_time:
    displayName: "完工时间"
    dataType:
      type: "timestamp"
    required: false

  # 关闭时间
  close_time:
    displayName: "关闭时间"
    dataType:
      type: "timestamp"
    required: false

  # 推荐的维修方案
  recommended_solution:
    displayName: "推荐的维修方案"
    dataType:
      type: "string"
    required: false

  # 实际使用的配件清单
  actual_parts_used:
    displayName: "实际使用的配件清单"
    dataType:
      type: "string"
    required: false

  # 实际工时
  actual_labor_hours:
    displayName: "实际工时(小时)"
    dataType:
      type: "double"
    required: false

  # 维修费用
  repair_cost:
    displayName: "维修费用(元)"
    dataType:
      type: "double"
    required: false

  # 维修照片链接
  repair_photos:
    displayName: "维修照片链接"
    dataType:
      type: "string"
    required: false

  # 服务态度评分
  service_attitude_score:
    displayName: "服务态度评分(1-5星)"
    dataType:
      type: "integer"
    required: false
    constraints:
      - "min: 1"
      - "max: 5"

# ====================
# 2. FUNCTIONS (计算规则)
# ====================
functions:
  # Function 1: 工单紧急程度
  calculate_urgency_level:
    displayName: "工单紧急程度"
    description: "根据工单类型和等待时长自动判断紧急程度"

    parameters:
      work_order_type:
        dataType: "string"
        description: "工单类型"
      created_time:
        dataType: "timestamp"
        description: "创建时间"
      dispatch_time:
        dataType: "timestamp"
        description: "派单时间"
      current_time:
        dataType: "timestamp"
        description: "当前时间"

    returnType:
      type: "string"
      enum: ["紧急", "高优先级", "普通"]

    logic: |
      # 计算等待时长(分钟)
      if dispatch_time is None:
          wait_minutes = (current_time - created_time).total_seconds() / 60
      else:
          return "普通"  # 已派单不再判断紧急程度

      # 根据工单类型和等待时长判断
      if work_order_type == "事故":
          if wait_minutes > 30:
              return "紧急"
          else:
              return "高优先级"
      elif work_order_type == "故障":
          if wait_minutes > 60:
              return "紧急"
          else:
              return "高优先级"
      elif work_order_type == "保养":
          if wait_minutes > 120:
              return "高优先级"
          else:
              return "普通"
      elif work_order_type == "召回":
          return "普通"
      else:
          return "普通"

    usageScenarios:
      - "工单列表中高亮显示紧急工单"
      - "触发超时告警自动化"
      - "调度系统优先级排序"

  # Function 2: 维修复杂度
  calculate_repair_complexity:
    displayName: "维修复杂度"
    description: "根据故障现象关键词判断维修难度"

    parameters:
      fault_description:
        dataType: "string"
        description: "故障现象描述"

    returnType:
      type: "string"
      enum: ["复杂", "一般", "简单"]

    logic: |
      # 关键词分类
      complex_keywords = ["发动机", "变速箱", "电池组", "电机", "刹车系统", "转向系统", "悬挂系统"]
      normal_keywords = ["空调", "音响", "车窗", "座椅", "仪表盘", "灯光", "胎压"]
      simple_keywords = ["轮胎", "雨刷", "保养", "玻璃水", "清洁"]

      # 转为小写便于匹配
      description_lower = fault_description.lower()

      # 检查是否包含关键词
      for keyword in complex_keywords:
          if keyword in description_lower:
              return "复杂"

      for keyword in normal_keywords:
          if keyword in description_lower:
              return "一般"

      for keyword in simple_keywords:
          if keyword in description_lower:
              return "简单"

      # 默认返回一般
      return "一般"

    usageScenarios:
      - "技师匹配(根据技师技能等级)"
      - "工时费用计算"
      - "预估维修时长"

  # Function 3: 配件库存状态
  check_parts_inventory:
    displayName: "配件库存状态"
    description: "检查推荐配件的库存情况"

    parameters:
      recommended_parts_list:
        dataType: "string"
        description: "推荐配件清单(逗号分隔)"

    returnType:
      type: "string"
      enum: ["库存充足", "库存不足", "缺货"]

    logic: |
      # 注: 实际实现需要连接配件系统API获取实时库存
      # 这里提供伪代码逻辑

      if not recommended_parts_list:
          return "库存充足"  # 无需配件

      parts = recommended_parts_list.split(",")
      out_of_stock_count = 0
      critical_parts_out = False

      for part in parts:
          part_name = part.strip()
          # 调用配件系统API
          inventory = get_parts_inventory(part_name)

          if inventory == 0:
              out_of_stock_count += 1
              # 判断是否关键配件
              if is_critical_part(part_name):
                  critical_parts_out = True

      # 判断库存状态
      if critical_parts_out or out_of_stock_count == len(parts):
          return "缺货"
      elif out_of_stock_count > 0:
          return "库存不足"
      else:
          return "库存充足"

    usageScenarios:
      - "工单创建时提前告警缺货"
      - "触发配件补货流程"
      - "派单时考虑配件可用性"

  # Function 4: 是否完工超时
  check_completion_timeout:
    displayName: "是否完工超时"
    description: "对比实际工时与标准工时判断是否超时"

    parameters:
      actual_labor_hours:
        dataType: "double"
        description: "实际工时"
      vehicle_model:
        dataType: "string"
        description: "车型"
      fault_description:
        dataType: "string"
        description: "故障现象"

    returnType:
      type: "string"
      enum: ["按时完工", "轻微超时", "严重超时"]

    logic: |
      # 从维修手册获取标准工时
      standard_hours = get_standard_labor_hours(vehicle_model, fault_description)

      if standard_hours is None or actual_labor_hours is None:
          return "按时完工"  # 数据不足,无法判断

      # 计算超时比例
      if actual_labor_hours <= standard_hours * 1.5:
          return "按时完工"
      elif actual_labor_hours <= standard_hours * 2.0:
          return "轻微超时"
      else:
          return "严重超时"

    usageScenarios:
      - "技师绩效考核"
      - "触发超时告警"
      - "质量分析"

  # Function 5: 是否一次修好(返修判断)
  check_if_rework:
    displayName: "是否一次修好"
    description: "查询30天内是否有相同故障的历史工单"

    parameters:
      vin_code:
        dataType: "string"
        description: "VIN码"
      fault_description:
        dataType: "string"
        description: "故障现象"
      created_time:
        dataType: "timestamp"
        description: "当前工单创建时间"

    returnType:
      type: "string"
      enum: ["正常", "返修"]

    logic: |
      # 查询历史工单
      history_orders = query_work_orders(
          vin_code=vin_code,
          start_date=created_time - timedelta(days=30),
          end_date=created_time,
          exclude_current=True
      )

      # 提取当前故障关键词
      current_keywords = extract_keywords(fault_description)

      # 检查历史工单是否有相似故障
      for order in history_orders:
          history_keywords = extract_keywords(order.fault_description)
          # 计算关键词重合度
          overlap = len(set(current_keywords) & set(history_keywords))
          if overlap > 0:
              return "返修"

      return "正常"

    usageScenarios:
      - "触发返修告警"
      - "质量分析"
      - "技师绩效考核"

  # Function 6: 车主满意度预测
  predict_customer_satisfaction:
    displayName: "车主满意度预测"
    description: "根据服务质量指标预测客户满意度"

    parameters:
      service_attitude_score:
        dataType: "integer"
        description: "服务态度评分(1-5)"
      is_rework:
        dataType: "string"
        description: "是否返修"
      repair_cost:
        dataType: "double"
        description: "维修费用"
      total_hours:
        dataType: "double"
        description: "总耗时(小时)"

    returnType:
      type: "string"
      enum: ["很满意", "满意", "一般", "不满意"]

    logic: |
      # 评分权重: 服务态度40% > 一次修好30% > 费用20% > 耗时10%

      # 服务态度得分 (40%)
      if service_attitude_score is None:
          attitude_score = 60  # 默认中等
      else:
          attitude_score = service_attitude_score * 20  # 1-5星 -> 20-100分

      # 一次修好得分 (30%)
      rework_score = 0 if is_rework == "返修" else 100

      # 费用合理性得分 (20%)
      # 简化逻辑: 假设<1000元=100分, 1000-3000元=80分, >3000元=60分
      if repair_cost < 1000:
          cost_score = 100
      elif repair_cost < 3000:
          cost_score = 80
      else:
          cost_score = 60

      # 耗时得分 (10%)
      # 简化逻辑: <4小时=100分, 4-8小时=80分, >8小时=60分
      if total_hours < 4:
          time_score = 100
      elif total_hours < 8:
          time_score = 80
      else:
          time_score = 60

      # 加权计算总分
      total_score = (attitude_score * 0.4 +
                     rework_score * 0.3 +
                     cost_score * 0.2 +
                     time_score * 0.1)

      # 满意度分级
      if total_score >= 85:
          return "很满意"
      elif total_score >= 70:
          return "满意"
      elif total_score >= 60:
          return "一般"
      else:
          return "不满意"

    usageScenarios:
      - "低满意度预警"
      - "主动回访"
      - "服务质量分析"

  # Function 7: 维修成本明细
  calculate_repair_cost:
    displayName: "维修成本明细"
    description: "自动计算配件成本、工时费用、总费用"

    parameters:
      actual_parts_used:
        dataType: "string"
        description: "实际使用的配件清单"
      actual_labor_hours:
        dataType: "double"
        description: "实际工时"
      repair_complexity:
        dataType: "string"
        description: "维修复杂度"

    returnType:
      type: "object"
      properties:
        parts_cost: "double"
        labor_cost: "double"
        total_cost: "double"

    logic: |
      # 计算配件成本
      parts_cost = 0.0
      if actual_parts_used:
          parts = actual_parts_used.split(",")
          for part in parts:
              part_name = part.strip()
              # 从价格表获取配件单价
              unit_price = get_parts_price(part_name)
              parts_cost += unit_price

      # 计算工时费用 (根据维修复杂度)
      if repair_complexity == "复杂":
          hourly_rate = 150
      elif repair_complexity == "一般":
          hourly_rate = 100
      else:  # 简单
          hourly_rate = 80

      labor_cost = actual_labor_hours * hourly_rate if actual_labor_hours else 0.0

      # 总费用
      total_cost = parts_cost + labor_cost

      return {
          "parts_cost": parts_cost,
          "labor_cost": labor_cost,
          "total_cost": total_cost
      }

    usageScenarios:
      - "完工时自动计算费用"
      - "生成电子账单"
      - "成本分析"

  # Function 8-11: 技师工作量统计、工单完成率、平均响应时间、配件使用频次
  # (由于篇幅限制,这里提供简化版配置,实际部署时需要完整实现)

  calculate_technician_workload:
    displayName: "技师工作量统计"
    description: "统计技师在指定时间范围内的完成工单数、累计工时、累计收入"
    returnType:
      type: "object"
      properties:
        completed_orders: "integer"
        total_hours: "double"
        total_income: "double"

  calculate_completion_rate:
    displayName: "工单完成率"
    description: "统计指定范围内的工单完成率和按时完成率"
    returnType:
      type: "object"
      properties:
        completion_rate: "double"
        on_time_rate: "double"

  calculate_average_response_time:
    displayName: "平均响应时间"
    description: "统计平均派单时长、接单时长、维修时长"
    returnType:
      type: "object"
      properties:
        avg_dispatch_time: "double"
        avg_accept_time: "double"
        avg_repair_time: "double"

  analyze_parts_usage:
    displayName: "配件使用频次分析"
    description: "统计配件使用频次和趋势,用于补货预测"
    returnType:
      type: "object"
      properties:
        total_usage: "integer"
        monthly_trend: "array"

# ====================
# 3. ACTIONS (操作)
# ====================
actions:
  # Action 1: 创建维修工单
  create_work_order:
    displayName: "创建维修工单"
    description: "创建新的维修服务工单"
    actionType: "create"

    parameters:
      vin_code:
        dataType: "string"
        displayName: "VIN码"
        description: "车辆识别代号"
        required: true
      vehicle_model:
        dataType: "string"
        displayName: "车型"
        required: true
      owner_name:
        dataType: "string"
        displayName: "车主姓名"
        required: true
      contact_phone:
        dataType: "string"
        displayName: "联系电话"
        required: true
      fault_description:
        dataType: "string"
        displayName: "故障现象"
        required: true
      work_order_type:
        dataType: "string"
        displayName: "工单类型"
        required: true
      brand:
        dataType: "string"
        displayName: "品牌"
        required: false
      license_plate:
        dataType: "string"
        displayName: "车牌号"
        required: false
      mileage:
        dataType: "integer"
        displayName: "行驶里程"
        required: false

    operations:
      - type: "createObject"
        target: "vehicle_service_work_order"
        parameters:
          work_order_number: "AUTO_GENERATE"  # 系统自动生成
          created_time: "CURRENT_TIMESTAMP"
          created_by: "CURRENT_USER"
          work_order_status: "待派单"

    permissions:
      roles:
        - "调度员"
        - "客服"

  # Action 2: 分配技师(派单)
  assign_technician:
    displayName: "分配技师"
    description: "将工单派给技师"
    actionType: "update"

    parameters:
      assigned_technician:
        dataType: "string"
        displayName: "分配的技师"
        required: true
      dispatch_note:
        dataType: "string"
        displayName: "派单备注"
        required: false

    preconditions:
      - condition: "work_order_status == '待派单'"
        errorMessage: "只能派单给状态为'待派单'的工单"

    operations:
      - type: "setProperty"
        target: "assigned_technician"
      - type: "setProperty"
        target: "dispatch_time"
        parameters:
          value: "CURRENT_TIMESTAMP"
      - type: "setProperty"
        target: "work_order_status"
        parameters:
          value: "进行中"

    permissions:
      roles:
        - "调度员"

  # Action 3-12: 其他操作
  # (由于YAML文件已经很长,这里列出操作名称,完整配置省略)

  accept_work_order:
    displayName: "技师接单"
    description: "技师确认接受分配的维修工单"
    actionType: "update"

    permissions:
      roles:
        - "技师"

    preconditions:
      - condition: "work_order_status == '进行中' && assigned_technician == CURRENT_USER"
        errorMessage: "只能接自己被分配的工单"

  vehicle_check_in:
    displayName: "车辆进店"
    description: "记录车辆到达服务站的时间"
    actionType: "update"

    permissions:
      roles:
        - "技师"
        - "前台"

    preconditions:
      - condition: "work_order_status == '进行中'"
        errorMessage: "只能对进行中的工单登记车辆进店"

  start_repair:
    displayName: "开始维修"
    description: "技师开始维修工作"
    actionType: "update"

    permissions:
      roles:
        - "技师"

    preconditions:
      - condition: "work_order_status == '进行中' && assigned_technician == CURRENT_USER"
        errorMessage: "只能开始维修自己负责的工单"

  submit_completion:
    displayName: "提交完工"
    description: "技师完成维修并提交工单"
    actionType: "update"

    permissions:
      roles:
        - "技师"

    preconditions:
      - condition: "work_order_status == '进行中' && assigned_technician == CURRENT_USER"
        errorMessage: "只能提交自己负责的工单"

  review_and_close:
    displayName: "审核关闭"
    description: "审核人员审核工单并关闭"
    actionType: "update"

    permissions:
      roles:
        - "审核人"
        - "主管"

    preconditions:
      - condition: "work_order_status == '已完工'"
        errorMessage: "只能审核已完工的工单"

  edit_work_order:
    displayName: "编辑工单信息"
    description: "修改工单的基本信息"
    actionType: "update"

    permissions:
      roles:
        - "调度员"
        - "客服"
        - "主管"

    preconditions:
      - condition: "work_order_status != '已关闭'"
        errorMessage: "已关闭的工单不能编辑"

  reject_or_transfer:
    displayName: "技师拒单/转派"
    description: "技师拒绝接单或请求转派给其他技师"
    actionType: "custom"

    permissions:
      roles:
        - "技师"
        - "调度员"

    preconditions:
      - condition: "work_order_status == '进行中' && (assigned_technician == CURRENT_USER || CURRENT_ROLE == '调度员')"
        errorMessage: "只能拒绝/转派自己的工单，或调度员可操作任何工单"

  cancel_work_order:
    displayName: "取消工单"
    description: "取消已创建的维修工单"
    actionType: "custom"

    confirmationRequired: true

    permissions:
      roles:
        - "主管"
        - "客服"

    preconditions:
      - condition: "work_order_status != '已关闭'"
        errorMessage: "已关闭的工单不能取消"

  request_technical_support:
    displayName: "申请技术支持"
    description: "技师遇到复杂问题申请技术支持"
    actionType: "custom"

    permissions:
      roles:
        - "技师"

    preconditions:
      - condition: "work_order_status == '进行中' && assigned_technician == CURRENT_USER"
        errorMessage: "只能为自己负责的进行中工单申请技术支持"

  mark_as_rework:
    displayName: "返修登记"
    description: "记录工单需要返修的情况"
    actionType: "custom"

    permissions:
      roles:
        - "技师"
        - "审核人"
        - "主管"

    preconditions:
      - condition: "work_order_status == '已完工' || work_order_status == '已关闭'"
        errorMessage: "只能对已完工或已关闭的工单登记返修"

# ====================
# 4. AUTOMATIONS (自动化规则)
# ====================
automations:
  # Automation 1: 工单超时自动提醒
  alert_work_order_timeout:
    displayName: "工单超时自动提醒"
    description: "当工单超时未派单时,自动通知调度主管"
    automationType: "event-driven"
    enabled: true

    trigger:
      type: "event"
      eventSource:
        type: "functionResult"
        functionName: "calculate_urgency_level"
        expectedResult: "紧急"

    workflow:
      - step: 1
        name: "发送告警通知"
        type: "sendNotification"
        notification:
          channel: "wechat"
          recipients:
            - "调度主管"
          template: "【超时告警】工单 {{work_order_number}} 已超时未派单,请尽快处理"

      - step: 2
        name: "高亮显示工单"
        type: "callAction"
        action: "highlight_work_order"

      - step: 3
        name: "记录超时日志"
        type: "callAction"
        action: "log_timeout_event"

    rateLimiting:
      maxExecutionsPerHour: 2
      cooldownMinutes: 30

  # Automation 2-14: 其他自动化规则
  # (篇幅限制,列出名称)

  alert_severe_timeout:
    displayName: "维修严重超时自动上报"
    automationType: "event-driven"

  alert_parts_shortage:
    displayName: "配件缺货自动通知"
    automationType: "event-driven"

  alert_suspected_rework:
    displayName: "疑似返修自动提醒"
    automationType: "event-driven"

  auto_recommend_solution:
    displayName: "工单创建后自动推荐维修方案"
    automationType: "event-driven"

  auto_reassign_after_rejection:
    displayName: "技师拒单后自动重新派单提醒"
    automationType: "event-driven"

  auto_calculate_and_notify:
    displayName: "完工后自动计算费用并通知客户"
    automationType: "event-driven"

  auto_satisfaction_survey:
    displayName: "审核关闭后自动触发满意度调查"
    automationType: "event-driven"

  auto_dispatch_expert:
    displayName: "申请技术支持后自动派遣专家"
    automationType: "event-driven"

  daily_statistics_report:
    displayName: "每日工单统计报告"
    automationType: "scheduled"
    trigger:
      type: "schedule"
      schedule:
        cron: "0 9 * * *"
        timezone: "Asia/Shanghai"

  weekly_technician_performance:
    displayName: "每周技师绩效报告"
    automationType: "scheduled"
    trigger:
      type: "schedule"
      schedule:
        cron: "0 9 * * 1"
        timezone: "Asia/Shanghai"

  monthly_parts_analysis:
    displayName: "每月配件使用分析"
    automationType: "scheduled"
    trigger:
      type: "schedule"
      schedule:
        cron: "0 9 1 * *"
        timezone: "Asia/Shanghai"

  daily_task_reminder:
    displayName: "每日待办提醒"
    automationType: "scheduled"
    trigger:
      type: "schedule"
      schedule:
        cron: "0 9 * * *"
        timezone: "Asia/Shanghai"

  weekly_rework_analysis:
    displayName: "每周返修分析报告"
    automationType: "scheduled"
    trigger:
      type: "schedule"
      schedule:
        cron: "0 9 * * 1"
        timezone: "Asia/Shanghai"

# ====================
# 6. METADATA (元数据)
# ====================
metadata:
  version: "1.0.0"
  createdBy: "Ontology Builder Skill"
  createdAt: "2026-03-19"
  businessOwner: "售后服务部门"
  technicalOwner: "IT部门"
  tags:
    - "汽车售后"
    - "维修管理"
    - "AI推荐"
    - "移动办公"

  # 业务场景说明
  businessContext:
    scenario: "汽车售后维修服务,整合AB系统数据,为技师提供统一APP操作界面,通过AI推荐维修方案,提升服务效率和客户满意度"
    targetUsers:
      - role: "调度员"
        description: "创建工单、分配技师、统筹调度"
      - role: "客服"
        description: "接收客户报修、查询工单状态、回复客户"
      - role: "技师"
        description: "接单、现场维修、记录结果、提交完工"
      - role: "审核人"
        description: "质量审核、关闭工单、绩效评估"

  # 数据源映射
  dataSources:
    - name: "AB系统"
      type: "api"
      connector: "ab_system_api"
      syncSchedule: "realtime"
      mapping:
        ab_work_order_id: "work_order_number"
        ab_vin: "vin_code"
        ab_customer_name: "owner_name"
        ab_fault_desc: "fault_description"

# ====================
# 7. VALIDATION RULES (全局校验规则)
# ====================
validationRules:
  - name: "工单完工必须有照片"
    description: "工单提交完工时必须上传维修照片"
    condition: "work_order_status == '已完工' AND repair_photos IS NULL"
    errorMessage: "请上传维修照片后再提交完工"
    severity: "error"

  - name: "关闭工单必须有服务评分"
    description: "审核关闭工单时必须填写服务态度评分"
    condition: "work_order_status == '已关闭' AND service_attitude_score IS NULL"
    errorMessage: "请先填写服务态度评分"
    severity: "error"

# ====================
# 8. INDEXES (索引优化)
# ====================
indexes:
  - name: "idx_vin_created_time"
    properties:
      - "vin_code"
      - "created_time"
    unique: false

  - name: "idx_work_order_number"
    properties:
      - "work_order_number"
    unique: true

  - name: "idx_status_created_time"
    properties:
      - "work_order_status"
      - "created_time"
    unique: false
