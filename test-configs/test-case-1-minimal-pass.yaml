# 测试场景1: 最小可通过配置
# 预期: P0全部通过，P1/P2有警告

objectType:
  apiName: "TestEquipment"
  displayName: "测试设备"

properties:
  - apiName: "equipmentId"
    displayName: "设备编号"
    dataType: "string"
    required: true

  - apiName: "equipmentName"
    displayName: "设备名称"
    dataType: "string"
    required: true

  - apiName: "status"
    displayName: "状态"
    dataType: "string"
    required: false

primaryKey: "equipmentId"

actions:
  - apiName: "createEquipment"
    displayName: "创建设备"
    actionType: "create"
    permissions:
      roles:
        - "管理员"
        - "操作员"

functions: []

automations: []
