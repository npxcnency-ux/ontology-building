# Palantir Ontology Configuration
# Generated by: Ontology Builder Skill
# Object Type: 车辆 (Vehicle)
# Generated: 2026-03-19

---
objectType:
  apiName: "vehicle"
  displayName: "车辆"
  pluralDisplayName: "车辆"
  description: "车辆档案管理，追踪维修历史，预测故障风险"
  icon: "car"

  # 主键定义
  primaryKey:
    - "vin_code"

# ====================
# 1. PROPERTIES (属性)
# ====================
properties:
  # VIN码 - 唯一标识
  vin_code:
    displayName: "VIN码"
    dataType:
      type: "string"
    required: true
    constraints:
      - "unique"
      - "length: 17"

  # 品牌
  brand:
    displayName: "品牌"
    dataType:
      type: "string"
    required: true

  # 车型
  vehicle_model:
    displayName: "车型"
    dataType:
      type: "string"
    required: true

  # 车系
  vehicle_series:
    displayName: "车系"
    dataType:
      type: "string"
    required: false

  # 车牌号
  license_plate:
    displayName: "车牌号"
    dataType:
      type: "string"
    required: false

  # 车辆颜色
  color:
    displayName: "车辆颜色"
    dataType:
      type: "string"
    required: false

  # 出厂日期
  manufacture_date:
    displayName: "出厂日期"
    dataType:
      type: "date"
    required: false

  # 购买日期
  purchase_date:
    displayName: "购买日期"
    dataType:
      type: "date"
    required: false

  # 当前里程
  current_mileage:
    displayName: "当前里程(公里)"
    dataType:
      type: "integer"
    required: false

  # 车主姓名
  owner_name:
    displayName: "车主姓名"
    dataType:
      type: "string"
    required: true

  # 车主电话
  owner_phone:
    displayName: "车主电话"
    dataType:
      type: "string"
    required: true
    constraints:
      - "pattern: ^1[3-9]\\d{9}$"

  # 车主地址
  owner_address:
    displayName: "车主地址"
    dataType:
      type: "string"
    required: false

  # 保险到期日
  insurance_expiry_date:
    displayName: "保险到期日"
    dataType:
      type: "date"
    required: false

  # 年检到期日
  inspection_expiry_date:
    displayName: "年检到期日"
    dataType:
      type: "date"
    required: false

  # 上次保养日期
  last_maintenance_date:
    displayName: "上次保养日期"
    dataType:
      type: "date"
    required: false

  # 上次保养里程
  last_maintenance_mileage:
    displayName: "上次保养里程(公里)"
    dataType:
      type: "integer"
    required: false

  # 累计维修次数
  total_repair_count:
    displayName: "累计维修次数"
    dataType:
      type: "integer"
    required: false
    defaultValue: 0

  # 累计维修费用
  total_repair_cost:
    displayName: "累计维修费用(元)"
    dataType:
      type: "double"
    required: false
    defaultValue: 0.0

  # 车辆状态
  vehicle_status:
    displayName: "车辆状态"
    dataType:
      type: "string"
      enum: ["正常使用", "维修中", "已报废", "已出售"]
    required: true
    defaultValue: "正常使用"

  # 健康评分
  health_score:
    displayName: "健康评分(0-100)"
    dataType:
      type: "integer"
    required: false
    constraints:
      - "min: 0"
      - "max: 100"

  # 创建时间
  created_time:
    displayName: "创建时间"
    dataType:
      type: "timestamp"
    required: true

  # 更新时间
  updated_time:
    displayName: "更新时间"
    dataType:
      type: "timestamp"
    required: false

# ====================
# 2. FUNCTIONS (计算规则)
# ====================
functions:
  # Function 1: 是否需要保养
  check_maintenance_due:
    displayName: "是否需要保养"
    description: "根据里程和时间判断是否到期保养"

    parameters:
      current_mileage:
        dataType: "integer"
        description: "当前里程"
      last_maintenance_mileage:
        dataType: "integer"
        description: "上次保养里程"
      last_maintenance_date:
        dataType: "date"
        description: "上次保养日期"
      current_date:
        dataType: "date"
        description: "当前日期"

    returnType:
      type: "string"
      enum: ["需要保养", "即将到期", "正常"]

    logic: |
      # 保养标准: 每5000公里或每6个月
      mileage_threshold = 5000
      time_threshold_days = 180

      # 计算里程差
      mileage_diff = current_mileage - last_maintenance_mileage if last_maintenance_mileage else current_mileage

      # 计算时间差
      days_diff = (current_date - last_maintenance_date).days if last_maintenance_date else 999

      # 判断是否需要保养
      if mileage_diff >= mileage_threshold or days_diff >= time_threshold_days:
          return "需要保养"
      elif mileage_diff >= mileage_threshold * 0.9 or days_diff >= time_threshold_days * 0.9:
          return "即将到期"
      else:
          return "正常"

    usageScenarios:
      - "车辆详情页显示保养状态"
      - "触发保养提醒自动化"
      - "主动营销保养服务"

  # Function 2: 故障风险等级
  calculate_fault_risk:
    displayName: "故障风险等级"
    description: "根据车龄、里程、维修历史预测故障风险"

    parameters:
      manufacture_date:
        dataType: "date"
        description: "出厂日期"
      current_mileage:
        dataType: "integer"
        description: "当前里程"
      total_repair_count:
        dataType: "integer"
        description: "累计维修次数"
      current_date:
        dataType: "date"
        description: "当前日期"

    returnType:
      type: "string"
      enum: ["高风险", "中风险", "低风险"]

    logic: |
      # 计算车龄(年)
      vehicle_age = (current_date - manufacture_date).days / 365 if manufacture_date else 0

      # 风险评分
      risk_score = 0

      # 车龄因素
      if vehicle_age > 8:
          risk_score += 40
      elif vehicle_age > 5:
          risk_score += 25
      elif vehicle_age > 3:
          risk_score += 10

      # 里程因素
      if current_mileage > 150000:
          risk_score += 40
      elif current_mileage > 100000:
          risk_score += 25
      elif current_mileage > 60000:
          risk_score += 10

      # 维修频次因素
      if total_repair_count > 10:
          risk_score += 20
      elif total_repair_count > 5:
          risk_score += 10

      # 判断风险等级
      if risk_score >= 70:
          return "高风险"
      elif risk_score >= 40:
          return "中风险"
      else:
          return "低风险"

    usageScenarios:
      - "车辆健康评分计算"
      - "高风险车辆主动关怀"
      - "延保服务推荐"

  # Function 3: 平均维修成本
  calculate_average_repair_cost:
    displayName: "平均维修成本"
    description: "计算单次维修平均费用"

    parameters:
      total_repair_cost:
        dataType: "double"
        description: "累计维修费用"
      total_repair_count:
        dataType: "integer"
        description: "累计维修次数"

    returnType:
      type: "double"

    logic: |
      if total_repair_count == 0:
          return 0.0
      return total_repair_cost / total_repair_count

    usageScenarios:
      - "成本分析报告"
      - "车型维修成本对比"

  # Function 4: 健康评分计算
  calculate_health_score:
    displayName: "健康评分"
    description: "综合计算车辆健康状况评分"

    parameters:
      vehicle_age:
        dataType: "double"
        description: "车龄(年)"
      current_mileage:
        dataType: "integer"
        description: "当前里程"
      total_repair_count:
        dataType: "integer"
        description: "累计维修次数"
      maintenance_status:
        dataType: "string"
        description: "保养状态"

    returnType:
      type: "integer"

    logic: |
      # 基础分100分
      score = 100

      # 车龄扣分
      if vehicle_age > 8:
          score -= 30
      elif vehicle_age > 5:
          score -= 20
      elif vehicle_age > 3:
          score -= 10

      # 里程扣分
      if current_mileage > 150000:
          score -= 25
      elif current_mileage > 100000:
          score -= 15
      elif current_mileage > 60000:
          score -= 5

      # 维修频次扣分
      if total_repair_count > 10:
          score -= 20
      elif total_repair_count > 5:
          score -= 10
      elif total_repair_count > 2:
          score -= 5

      # 保养状态扣分
      if maintenance_status == "需要保养":
          score -= 15
      elif maintenance_status == "即将到期":
          score -= 5

      # 确保分数在0-100之间
      return max(0, min(100, score))

    usageScenarios:
      - "车辆详情页展示"
      - "车辆健康排行榜"
      - "二手车估值参考"

  # Function 5: 保险即将到期
  check_insurance_expiry:
    displayName: "保险即将到期"
    description: "检查保险是否即将到期"

    parameters:
      insurance_expiry_date:
        dataType: "date"
        description: "保险到期日"
      current_date:
        dataType: "date"
        description: "当前日期"

    returnType:
      type: "string"
      enum: ["已过期", "即将到期", "正常"]

    logic: |
      if not insurance_expiry_date:
          return "正常"

      days_remaining = (insurance_expiry_date - current_date).days

      if days_remaining < 0:
          return "已过期"
      elif days_remaining <= 30:
          return "即将到期"
      else:
          return "正常"

    usageScenarios:
      - "保险续保提醒"
      - "主动营销保险服务"

# ====================
# 3. ACTIONS (操作)
# ====================
actions:
  # Action 1: 创建车辆档案
  create_vehicle:
    displayName: "创建车辆档案"
    description: "为新车创建档案记录"
    actionType: "create"

    parameters:
      vin_code:
        dataType: "string"
        displayName: "VIN码"
        required: true
      brand:
        dataType: "string"
        displayName: "品牌"
        required: true
      vehicle_model:
        dataType: "string"
        displayName: "车型"
        required: true
      owner_name:
        dataType: "string"
        displayName: "车主姓名"
        required: true
      owner_phone:
        dataType: "string"
        displayName: "车主电话"
        required: true
      license_plate:
        dataType: "string"
        displayName: "车牌号"
        required: false
      purchase_date:
        dataType: "date"
        displayName: "购买日期"
        required: false
      current_mileage:
        dataType: "integer"
        displayName: "当前里程"
        required: false

    operations:
      - type: "createObject"
        target: "vehicle"
        parameters:
          created_time: "CURRENT_TIMESTAMP"
          vehicle_status: "正常使用"
          total_repair_count: 0
          total_repair_cost: 0.0

    permissions:
      roles:
        - "调度员"
        - "客服"

  # Action 2: 更新车辆信息
  update_vehicle_info:
    displayName: "更新车辆信息"
    description: "修改车辆基本信息"
    actionType: "update"

    parameters:
      owner_name:
        dataType: "string"
        displayName: "车主姓名"
        required: false
      owner_phone:
        dataType: "string"
        displayName: "车主电话"
        required: false
      owner_address:
        dataType: "string"
        displayName: "车主地址"
        required: false
      license_plate:
        dataType: "string"
        displayName: "车牌号"
        required: false
      current_mileage:
        dataType: "integer"
        displayName: "当前里程"
        required: false

    operations:
      - type: "setProperty"
        target: "updated_time"
        parameters:
          value: "CURRENT_TIMESTAMP"

    permissions:
      roles:
        - "调度员"
        - "客服"

  # Action 3: 记录保养
  record_maintenance:
    displayName: "记录保养"
    description: "更新车辆保养记录"
    actionType: "update"

    parameters:
      maintenance_date:
        dataType: "date"
        displayName: "保养日期"
        required: true
      maintenance_mileage:
        dataType: "integer"
        displayName: "保养时里程"
        required: true

    operations:
      - type: "setProperty"
        target: "last_maintenance_date"
      - type: "setProperty"
        target: "last_maintenance_mileage"
      - type: "setProperty"
        target: "current_mileage"
      - type: "setProperty"
        target: "updated_time"
        parameters:
          value: "CURRENT_TIMESTAMP"

    permissions:
      roles:
        - "技师"
        - "调度员"

  # Action 4: 更新维修统计
  update_repair_stats:
    displayName: "更新维修统计"
    description: "在工单完工后自动更新车辆维修统计"
    actionType: "custom"

    parameters:
      repair_cost:
        dataType: "double"
        displayName: "本次维修费用"
        required: true

    operations:
      - type: "incrementProperty"
        target: "total_repair_count"
        parameters:
          increment: 1
      - type: "incrementProperty"
        target: "total_repair_cost"
        parameters:
          increment: "repair_cost"
      - type: "setProperty"
        target: "updated_time"
        parameters:
          value: "CURRENT_TIMESTAMP"

    permissions:
      roles:
        - "系统自动调用"

  # Action 5: 变更车辆状态
  change_vehicle_status:
    displayName: "变更车辆状态"
    description: "修改车辆状态(报废、出售等)"
    actionType: "update"

    parameters:
      new_status:
        dataType: "string"
        displayName: "新状态"
        required: true
        validation:
          - "enum: ['正常使用', '维修中', '已报废', '已出售']"
      reason:
        dataType: "string"
        displayName: "变更原因"
        required: true

    operations:
      - type: "setProperty"
        target: "vehicle_status"
      - type: "setProperty"
        target: "updated_time"
        parameters:
          value: "CURRENT_TIMESTAMP"

    permissions:
      roles:
        - "管理员"

# ====================
# 4. AUTOMATIONS (自动化规则)
# ====================
automations:
  # Automation 1: 保养到期提醒
  maintenance_due_reminder:
    displayName: "保养到期提醒"
    description: "自动提醒车主进行保养"
    automationType: "event-driven"
    enabled: true

    trigger:
      type: "event"
      eventSource:
        type: "functionResult"
        functionName: "check_maintenance_due"
        expectedResult: "需要保养"

    workflow:
      - step: 1
        name: "发送保养提醒"
        type: "sendNotification"
        notification:
          channel: "sms"
          recipients:
            - "车主手机"
          template: "【保养提醒】您的车辆{{brand}} {{vehicle_model}}({{license_plate}})已到保养周期，建议尽快保养。"

      - step: 2
        name: "通知门店"
        type: "sendNotification"
        notification:
          channel: "wechat"
          recipients:
            - "客服团队"
          template: "车辆{{license_plate}}需要保养，请主动联系车主预约。"

    rateLimiting:
      maxExecutionsPerHour: 1
      cooldownMinutes: 1440  # 24小时内只提醒1次

  # Automation 2: 保险到期提醒
  insurance_expiry_reminder:
    displayName: "保险到期提醒"
    description: "自动提醒车主续保"
    automationType: "event-driven"
    enabled: true

    trigger:
      type: "event"
      eventSource:
        type: "functionResult"
        functionName: "check_insurance_expiry"
        expectedResult: "即将到期"

    workflow:
      - step: 1
        name: "发送续保提醒"
        type: "sendNotification"
        notification:
          channel: "sms"
          recipients:
            - "车主手机"
          template: "【续保提醒】您的车辆保险将于{{insurance_expiry_date}}到期，请及时续保。"

    rateLimiting:
      maxExecutionsPerHour: 1
      cooldownMinutes: 1440

  # Automation 3: 高风险车辆主动关怀
  high_risk_vehicle_care:
    displayName: "高风险车辆主动关怀"
    description: "对高风险车辆主动联系关怀"
    automationType: "event-driven"
    enabled: true

    trigger:
      type: "event"
      eventSource:
        type: "functionResult"
        functionName: "calculate_fault_risk"
        expectedResult: "高风险"

    workflow:
      - step: 1
        name: "创建关怀任务"
        type: "callAction"
        action: "create_care_task"

      - step: 2
        name: "通知客服"
        type: "sendNotification"
        notification:
          channel: "wechat"
          recipients:
            - "客服主管"
          template: "【高风险车辆】{{license_plate}}故障风险高，请主动联系车主检查。"

  # Automation 4: 每周车辆健康报告
  weekly_vehicle_health_report:
    displayName: "每周车辆健康报告"
    description: "生成车辆健康分析报告"
    automationType: "scheduled"
    enabled: true

    trigger:
      type: "schedule"
      schedule:
        cron: "0 9 * * 1"
        timezone: "Asia/Shanghai"

    workflow:
      - step: 1
        name: "统计车辆健康数据"
        type: "callFunction"
        function: "calculate_health_score"

      - step: 2
        name: "生成报告"
        type: "generateReport"
        report:
          template: "vehicle_health_report"

      - step: 3
        name: "发送报告"
        type: "sendNotification"
        notification:
          channel: "email"
          recipients:
            - "运营经理"
          template: "车辆健康周报"

# ====================
# 5. LINKS (关联关系)
# ====================
links:
  # Link 1: 车辆 ←→ 维修工单
  service_work_orders:
    displayName: "维修记录"
    targetObjectType: "vehicle_service_work_order"
    linkType: "oneToMany"
    description: "一辆车有多条维修记录"

# ====================
# 6. METADATA (元数据)
# ====================
metadata:
  version: "1.0.0"
  createdBy: "Ontology Builder Skill"
  createdAt: "2026-03-19"
  businessOwner: "售后服务部门"
  technicalOwner: "IT部门"
  tags:
    - "车辆管理"
    - "健康评分"
    - "保养提醒"

  businessContext:
    scenario: "车辆档案管理，追踪维修历史，预测故障风险，主动服务营销"
    targetUsers:
      - role: "客服"
        description: "查询车辆信息，主动营销服务"
      - role: "调度员"
        description: "管理车辆档案，统计分析"
      - role: "技师"
        description: "记录保养信息"

  dataSources:
    - name: "AB系统"
      type: "api"
      connector: "ab_system_api"
      syncSchedule: "realtime"
      mapping:
        ab_vin: "vin_code"
        ab_owner: "owner_name"

