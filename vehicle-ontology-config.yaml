    properties:
      - "vin_code"
    unique: true

  - name: "idx_license_plate"
    properties:
      - "license_plate"
    unique: false

  - name: "idx_owner_phone"
    properties:
      - "owner_phone"
    unique: false

  - name: "idx_vehicle_status"
    properties:
      - "vehicle_status"
    unique: false
