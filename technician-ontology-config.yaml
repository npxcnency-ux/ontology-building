# Palantir Ontology Configuration
# Generated by: Ontology Builder Skill
# Object Type: 技师 (Technician)
# Generated: 2026-03-19

---
objectType:
  apiName: "technician"
  displayName: "技师"
  pluralDisplayName: "技师"
  description: "技师档案管理，技能评估，工作负载追踪，绩效分析"
  icon: "user-hard-hat"

  # 主键定义
  primaryKey:
    - "technician_id"

# ====================
# 1. PROPERTIES (属性)
# ====================
properties:
  # 技师ID - 唯一标识
  technician_id:
    displayName: "技师ID"
    dataType:
      type: "string"
    required: true
    constraints:
      - "unique"

  # 姓名
  name:
    displayName: "姓名"
    dataType:
      type: "string"
    required: true

  # 工号
  employee_number:
    displayName: "工号"
    dataType:
      type: "string"
    required: true
    constraints:
      - "unique"

  # 联系电话
  phone:
    displayName: "联系电话"
    dataType:
      type: "string"
    required: true
    constraints:
      - "pattern: ^1[3-9]\\d{9}$"

  # 技能等级
  skill_level:
    displayName: "技能等级"
    dataType:
      type: "string"
      enum: ["初级", "中级", "高级", "专家"]
    required: true
    defaultValue: "初级"

  # 专长领域
  specialties:
    displayName: "专长领域"
    dataType:
      type: "string"
    required: false

  # 入职日期
  hire_date:
    displayName: "入职日期"
    dataType:
      type: "date"
    required: true

  # 所属门店
  store_location:
    displayName: "所属门店"
    dataType:
      type: "string"
    required: false

  # 当前状态
  technician_status:
    displayName: "当前状态"
    dataType:
      type: "string"
      enum: ["在岗", "休假", "培训中", "已离职"]
    required: true
    defaultValue: "在岗"

  # 今日接单数
  today_order_count:
    displayName: "今日接单数"
    dataType:
      type: "integer"
    required: false
    defaultValue: 0

  # 本周接单数
  week_order_count:
    displayName: "本周接单数"
    dataType:
      type: "integer"
    required: false
    defaultValue: 0

  # 本月接单数
  month_order_count:
    displayName: "本月接单数"
    dataType:
      type: "integer"
    required: false
    defaultValue: 0

  # 累计完成工单数
  total_completed_orders:
    displayName: "累计完成工单数"
    dataType:
      type: "integer"
    required: false
    defaultValue: 0

  # 累计工时
  total_labor_hours:
    displayName: "累计工时(小时)"
    dataType:
      type: "double"
    required: false
    defaultValue: 0.0

  # 累计收入
  total_income:
    displayName: "累计收入(元)"
    dataType:
      type: "double"
    required: false
    defaultValue: 0.0

  # 按时完成率
  on_time_completion_rate:
    displayName: "按时完成率(%)"
    dataType:
      type: "double"
    required: false

  # 客户满意度评分
  customer_satisfaction_score:
    displayName: "客户满意度评分(0-5)"
    dataType:
      type: "double"
    required: false

  # 返修率
  rework_rate:
    displayName: "返修率(%)"
    dataType:
      type: "double"
    required: false

  # 拒单次数
  rejection_count:
    displayName: "拒单次数"
    dataType:
      type: "integer"
    required: false
    defaultValue: 0

  # 技术支援请求次数
  support_request_count:
    displayName: "技术支援请求次数"
    dataType:
      type: "integer"
    required: false
    defaultValue: 0

  # 最后接单时间
  last_order_time:
    displayName: "最后接单时间"
    dataType:
      type: "timestamp"
    required: false

  # 当前负载(进行中工单数)
  current_workload:
    displayName: "当前负载(进行中工单数)"
    dataType:
      type: "integer"
    required: false
    defaultValue: 0

  # 创建时间
  created_time:
    displayName: "创建时间"
    dataType:
      type: "timestamp"
    required: true

  # 更新时间
  updated_time:
    displayName: "更新时间"
    dataType:
      type: "timestamp"
    required: false

# ====================
# 2. FUNCTIONS (计算规则)
# ====================
functions:
  # Function 1: 综合绩效评分
  calculate_performance_score:
    displayName: "综合绩效评分"
    description: "根据完成率、满意度、返修率计算综合绩效"

    parameters:
      on_time_completion_rate:
        dataType: "double"
        description: "按时完成率"
      customer_satisfaction_score:
        dataType: "double"
        description: "客户满意度"
      rework_rate:
        dataType: "double"
        description: "返修率"

    returnType:
      type: "double"

    logic: |
      # 绩效评分 = 按时完成率 × 30% + 满意度 × 40% + (100 - 返修率) × 30%

      # 归一化满意度(0-5 -> 0-100)
      satisfaction_normalized = (customer_satisfaction_score / 5) * 100 if customer_satisfaction_score else 80

      # 计算
      score = (on_time_completion_rate * 0.3 +
               satisfaction_normalized * 0.4 +
               (100 - rework_rate) * 0.3)

      return round(score, 2)

    usageScenarios:
      - "技师绩效排行榜"
      - "绩效考核"
      - "奖金计算"

  # Function 2: 是否可以接单
  check_availability:
    displayName: "是否可以接单"
    description: "判断技师当前是否可以接新工单"

    parameters:
      technician_status:
        dataType: "string"
        description: "当前状态"
      current_workload:
        dataType: "integer"
        description: "当前负载"
      today_order_count:
        dataType: "integer"
        description: "今日接单数"

    returnType:
      type: "string"
      enum: ["可接单", "负载已满", "不在岗", "今日已达上限"]

    logic: |
      # 每日接单上限
      daily_limit = 8
      # 同时进行工单上限
      concurrent_limit = 3

      # 判断
      if technician_status != "在岗":
          return "不在岗"
      elif today_order_count >= daily_limit:
          return "今日已达上限"
      elif current_workload >= concurrent_limit:
          return "负载已满"
      else:
          return "可接单"

    usageScenarios:
      - "派单时技师筛选"
      - "技师APP接单提示"

  # Function 3: 技能匹配度
  calculate_skill_match:
    displayName: "技能匹配度"
    description: "评估技师技能与工单需求的匹配程度"

    parameters:
      skill_level:
        dataType: "string"
        description: "技能等级"
      repair_complexity:
        dataType: "string"
        description: "维修复杂度"
      specialties:
        dataType: "string"
        description: "专长领域"
      fault_category:
        dataType: "string"
        description: "故障类别"

    returnType:
      type: "integer"

    logic: |
      # 基础匹配分
      base_score = 0

      # 技能等级与复杂度匹配
      if repair_complexity == "复杂":
          if skill_level in ["高级", "专家"]:
              base_score = 90
          elif skill_level == "中级":
              base_score = 60
          else:
              base_score = 30
      elif repair_complexity == "一般":
          if skill_level in ["中级", "高级", "专家"]:
              base_score = 80
          else:
              base_score = 50
      else:  # 简单
          base_score = 70

      # 专长领域加分
      if specialties and fault_category:
          if fault_category in specialties:
              base_score += 10

      return min(100, base_score)

    usageScenarios:
      - "智能派单算法"
      - "技师推荐排序"

  # Function 4: 工作效率评级
  calculate_efficiency_rating:
    displayName: "工作效率评级"
    description: "评估技师工作效率"

    parameters:
      total_completed_orders:
        dataType: "integer"
        description: "累计完成工单数"
      total_labor_hours:
        dataType: "double"
        description: "累计工时"
      hire_date:
        dataType: "date"
        description: "入职日期"
      current_date:
        dataType: "date"
        description: "当前日期"

    returnType:
      type: "string"
      enum: ["高效", "正常", "低效"]

    logic: |
      # 计算工龄(月)
      work_months = ((current_date - hire_date).days / 30) if hire_date else 1

      # 平均每月完成工单数
      avg_monthly_orders = total_completed_orders / work_months if work_months > 0 else 0

      # 判断效率
      if avg_monthly_orders >= 40:
          return "高效"
      elif avg_monthly_orders >= 20:
          return "正常"
      else:
          return "低效"

    usageScenarios:
      - "效率分析报告"
      - "培训需求识别"

  # Function 5: 本月预计收入
  estimate_month_income:
    displayName: "本月预计收入"
    description: "根据当前进度预测本月收入"

    parameters:
      month_order_count:
        dataType: "integer"
        description: "本月已完成工单数"
      current_day_of_month:
        dataType: "integer"
        description: "当前是本月第几天"

    returnType:
      type: "double"

    logic: |
      # 假设平均每单收入300元
      avg_income_per_order = 300

      # 预测本月总工单数
      if current_day_of_month > 0:
          estimated_total_orders = (month_order_count / current_day_of_month) * 30
      else:
          estimated_total_orders = month_order_count

      # 预计收入
      return estimated_total_orders * avg_income_per_order

    usageScenarios:
      - "技师个人收入预测"
      - "薪资规划"

# ====================
# 3. ACTIONS (操作)
# ====================
actions:
  # Action 1: 创建技师档案
  create_technician:
    displayName: "创建技师档案"
    description: "为新入职技师创建档案"
    actionType: "create"

    parameters:
      technician_id:
        dataType: "string"
        displayName: "技师ID"
        required: true
      name:
        dataType: "string"
        displayName: "姓名"
        required: true
      employee_number:
        dataType: "string"
        displayName: "工号"
        required: true
      phone:
        dataType: "string"
        displayName: "联系电话"
        required: true
      skill_level:
        dataType: "string"
        displayName: "技能等级"
        required: true
      hire_date:
        dataType: "date"
        displayName: "入职日期"
        required: true
      specialties:
        dataType: "string"
        displayName: "专长领域"
        required: false

    operations:
      - type: "createObject"
        target: "technician"
        parameters:
          created_time: "CURRENT_TIMESTAMP"
          technician_status: "在岗"
          total_completed_orders: 0
          current_workload: 0

    permissions:
      roles:
        - "HR人事"
        - "管理员"

  # Action 2: 更新技师信息
  update_technician_info:
    displayName: "更新技师信息"
    description: "修改技师基本信息"
    actionType: "update"

    parameters:
      phone:
        dataType: "string"
        displayName: "联系电话"
        required: false
      skill_level:
        dataType: "string"
        displayName: "技能等级"
        required: false
      specialties:
        dataType: "string"
        displayName: "专长领域"
        required: false
      store_location:
        dataType: "string"
        displayName: "所属门店"
        required: false

    operations:
      - type: "setProperty"
        target: "updated_time"
        parameters:
          value: "CURRENT_TIMESTAMP"

    permissions:
      roles:
        - "HR人事"
        - "管理员"

  # Action 3: 变更技师状态
  change_technician_status:
    displayName: "变更技师状态"
    description: "修改技师在岗状态"
    actionType: "update"

    parameters:
      new_status:
        dataType: "string"
        displayName: "新状态"
        required: true
        validation:
          - "enum: ['在岗', '休假', '培训中', '已离职']"
      reason:
        dataType: "string"
        displayName: "变更原因"
        required: true

    operations:
      - type: "setProperty"
        target: "technician_status"
      - type: "setProperty"
        target: "updated_time"
        parameters:
          value: "CURRENT_TIMESTAMP"

    permissions:
      roles:
        - "HR人事"
        - "管理员"

  # Action 4: 更新工作负载
  update_workload:
    displayName: "更新工作负载"
    description: "在工单状态变化时自动更新技师负载"
    actionType: "custom"

    parameters:
      workload_change:
        dataType: "integer"
        displayName: "负载变化"
        required: true

    operations:
      - type: "incrementProperty"
        target: "current_workload"
        parameters:
          increment: "workload_change"

    permissions:
      roles:
        - "系统自动调用"

  # Action 5: 更新绩效统计
  update_performance_stats:
    displayName: "更新绩效统计"
    description: "在工单完工后自动更新技师绩效数据"
    actionType: "custom"

    parameters:
      labor_hours:
        dataType: "double"
        displayName: "本次工时"
        required: true
      income:
        dataType: "double"
        displayName: "本次收入"
        required: true
      is_on_time:
        dataType: "boolean"
        displayName: "是否按时完工"
        required: true
      satisfaction_score:
        dataType: "double"
        displayName: "本次满意度评分"
        required: true

    operations:
      - type: "incrementProperty"
        target: "total_completed_orders"
        parameters:
          increment: 1
      - type: "incrementProperty"
        target: "total_labor_hours"
        parameters:
          increment: "labor_hours"
      - type: "incrementProperty"
        target: "total_income"
        parameters:
          increment: "income"
      - type: "callFunction"
        target: "recalculate_performance_metrics"

    permissions:
      roles:
        - "系统自动调用"

# ====================
# 4. AUTOMATIONS (自动化规则)
# ====================
automations:
  # Automation 1: 高负载技师告警
  high_workload_alert:
    displayName: "高负载技师告警"
    description: "技师负载过高时提醒调度员"
    automationType: "event-driven"
    enabled: true

    trigger:
      type: "event"
      eventSource:
        type: "propertyChange"
        propertyName: "current_workload"
        condition: "value >= 3"

    workflow:
      - step: 1
        name: "发送高负载告警"
        type: "sendNotification"
        notification:
          channel: "wechat"
          recipients:
            - "调度主管"
          template: "【高负载】技师{{name}}当前有{{current_workload}}个进行中工单，请注意分配。"

  # Automation 2: 低绩效技师辅导提醒
  low_performance_coaching:
    displayName: "低绩效技师辅导提醒"
    description: "绩效评分低于60分时触发辅导流程"
    automationType: "event-driven"
    enabled: true

    trigger:
      type: "event"
      eventSource:
        type: "functionResult"
        functionName: "calculate_performance_score"
        condition: "result < 60"

    workflow:
      - step: 1
        name: "创建辅导任务"
        type: "callAction"
        action: "create_coaching_task"

      - step: 2
        name: "通知技师主管"
        type: "sendNotification"
        notification:
          channel: "wechat"
          recipients:
            - "技师主管"
          template: "【低绩效】技师{{name}}综合绩效评分{{performance_score}}，需要辅导。"

  # Automation 3: 每日工作量统计重置
  daily_stats_reset:
    displayName: "每日工作量统计重置"
    description: "每天凌晨重置今日接单数"
    automationType: "scheduled"
    enabled: true

    trigger:
      type: "schedule"
      schedule:
        cron: "0 0 * * *"
        timezone: "Asia/Shanghai"

    workflow:
      - step: 1
        name: "重置今日接单数"
        type: "bulkUpdate"
        update:
          target: "today_order_count"
          value: 0

  # Automation 4: 每周绩效报告
  weekly_performance_report:
    displayName: "每周绩效报告"
    description: "生成技师绩效周报"
    automationType: "scheduled"
    enabled: true

    trigger:
      type: "schedule"
      schedule:
        cron: "0 9 * * 1"
        timezone: "Asia/Shanghai"

    workflow:
      - step: 1
        name: "统计技师绩效"
        type: "callFunction"
        function: "calculate_performance_score"

      - step: 2
        name: "生成排行榜"
        type: "generateReport"
        report:
          template: "technician_performance_ranking"

      - step: 3
        name: "发送报告"
        type: "sendNotification"
        notification:
          channel: "email"
          recipients:
            - "技师主管"
            - "运营经理"
          template: "技师绩效周报"

  # Automation 5: 技能升级提醒
  skill_upgrade_reminder:
    displayName: "技能升级提醒"
    description: "满足升级条件时提醒HR"
    automationType: "event-driven"
    enabled: true

    trigger:
      type: "event"
      eventSource:
        type: "functionResult"
        functionName: "calculate_performance_score"
        condition: "result >= 85 AND skill_level != '专家'"

    workflow:
      - step: 1
        name: "通知HR"
        type: "sendNotification"
        notification:
          channel: "wechat"
          recipients:
            - "HR人事"
          template: "【技能升级】技师{{name}}绩效评分{{performance_score}}，建议考虑技能等级晋升。"

# ====================
# 5. LINKS (关联关系)
# ====================
links:
  # Link 1: 技师 ←→ 维修工单
  assigned_work_orders:
    displayName: "负责的工单"
    targetObjectType: "vehicle_service_work_order"
    linkType: "oneToMany"
    description: "一个技师负责多个工单"

