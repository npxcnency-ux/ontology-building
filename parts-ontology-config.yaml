  create_part:
    displayName: "创建配件"
    description: "添加新配件到系统"
    actionType: "create"

    parameters:
      part_number:
        dataType: "string"
        displayName: "配件编号"
        required: true
      part_name:
        dataType: "string"
        displayName: "配件名称"
        required: true
      part_category:
        dataType: "string"
        displayName: "配件类别"
        required: true
      standard_price:
        dataType: "double"
        displayName: "标准单价"
        required: true
      cost_price:
        dataType: "double"
        displayName: "成本价"
        required: false
      current_stock:
        dataType: "integer"
        displayName: "初始库存"
        required: false
      safety_stock_min:
        dataType: "integer"
        displayName: "安全库存下限"
        required: false
      is_critical:
        dataType: "boolean"
        displayName: "是否关键配件"
        required: false

    operations:
      - type: "createObject"
        target: "parts"
        parameters:
          created_time: "CURRENT_TIMESTAMP"
          part_status: "在售"
          total_usage_count: 0

    permissions:
      roles:
        - "配件管理员"
        - "管理员"

  # Action 2: 更新配件信息
  update_part_info:
    displayName: "更新配件信息"
    description: "修改配件基本信息"
    actionType: "update"

    parameters:
      part_name:
        dataType: "string"
        displayName: "配件名称"
        required: false
      standard_price:
        dataType: "double"
        displayName: "标准单价"
        required: false
      cost_price:
        dataType: "double"
        displayName: "成本价"
        required: false
      supplier:
        dataType: "string"
        displayName: "供应商"
        required: false
      safety_stock_min:
        dataType: "integer"
        displayName: "安全库存下限"
        required: false
      max_stock_limit:
        dataType: "integer"
        displayName: "最大库存上限"
        required: false

    operations:
      - type: "setProperty"
        target: "updated_time"
        parameters:
          value: "CURRENT_TIMESTAMP"

    permissions:
      roles:
        - "配件管理员"

  # Action 3: 入库
  stock_in:
    displayName: "入库"
    description: "配件入库操作"
    actionType: "custom"

    parameters:
      quantity:
        dataType: "integer"
        displayName: "入库数量"
        required: true
      stock_in_date:
        dataType: "date"
        displayName: "入库日期"
        required: true

    operations:
      - type: "incrementProperty"
        target: "current_stock"
        parameters:
          increment: "quantity"
      - type: "setProperty"
        target: "last_stock_in_date"
      - type: "setProperty"
        target: "part_status"
        parameters:
          value: "在售"
      - type: "setProperty"
        target: "updated_time"
        parameters:
          value: "CURRENT_TIMESTAMP"

    permissions:
      roles:
        - "配件管理员"
        - "仓管"

  # Action 4: 出库(使用)
  stock_out:
    displayName: "出库"
    description: "配件出库使用"
    actionType: "custom"

    parameters:
      quantity:
        dataType: "integer"
        displayName: "出库数量"
        required: true
      work_order_number:
        dataType: "string"
        displayName: "关联工单号"
        required: true

    preconditions:
      - condition: "current_stock >= quantity"
        errorMessage: "库存不足，无法出库"

    operations:
      - type: "incrementProperty"
        target: "current_stock"
        parameters:
          increment: "-quantity"
      - type: "incrementProperty"
        target: "today_usage_count"
        parameters:
          increment: "quantity"
      - type: "incrementProperty"
        target: "week_usage_count"
        parameters:
          increment: "quantity"
      - type: "incrementProperty"
        target: "month_usage_count"
        parameters:
          increment: "quantity"
      - type: "incrementProperty"
        target: "total_usage_count"
        parameters:
          increment: "quantity"
      - type: "setProperty"
        target: "last_stock_out_date"
        parameters:
          value: "CURRENT_DATE"
      - type: "setProperty"
        target: "updated_time"
        parameters:
          value: "CURRENT_TIMESTAMP"

    permissions:
      roles:
        - "技师"
        - "配件管理员"

  # Action 5: 库存盘点
  inventory_check:
    displayName: "库存盘点"
    description: "更新实际库存数量"
    actionType: "update"

    parameters:
      actual_stock:
        dataType: "integer"
        displayName: "实际库存"
        required: true
      check_note:
        dataType: "string"
        displayName: "盘点备注"
        required: false

    operations:
      - type: "setProperty"
        target: "current_stock"
      - type: "setProperty"
        target: "updated_time"
        parameters:
          value: "CURRENT_TIMESTAMP"

    permissions:
      roles:
        - "配件管理员"
        - "仓管"

  # Action 6: 变更配件状态
  change_part_status:
    displayName: "变更配件状态"
    description: "修改配件状态(停产、缺货等)"
    actionType: "update"

    parameters:
      new_status:
        dataType: "string"
        displayName: "新状态"
        required: true
        validation:
          - "enum: ['在售', '缺货', '停产', '待检']"
      reason:
        dataType: "string"
        displayName: "变更原因"
        required: true

    operations:
      - type: "setProperty"
        target: "part_status"
      - type: "setProperty"
        target: "updated_time"
        parameters:
          value: "CURRENT_TIMESTAMP"

    permissions:
      roles:
        - "配件管理员"

# ====================
# 4. AUTOMATIONS (自动化规则)
# ====================
automations:
  # Automation 1: 库存不足自动告警
  low_stock_alert:
    displayName: "库存不足自动告警"
    description: "库存低于安全线时自动通知"
    automationType: "event-driven"
    enabled: true

    trigger:
      type: "event"
      eventSource:
        type: "functionResult"
        functionName: "check_inventory_status"
        expectedResult: "库存不足"

    workflow:
      - step: 1
        name: "发送库存告警"
        type: "sendNotification"
        notification:
          channel: "wechat"
          recipients:
            - "配件管理员"
          template: "【库存不足】配件{{part_name}}({{part_number}})库存不足，当前{{current_stock}}，安全库存{{safety_stock_min}}。"

      - step: 2
        name: "计算建议补货量"
        type: "callFunction"
        function: "calculate_reorder_quantity"

      - step: 3
        name: "创建补货提醒"
        type: "callAction"
        action: "create_reorder_reminder"

    rateLimiting:
      maxExecutionsPerHour: 1
      cooldownMinutes: 1440

  # Automation 2: 关键配件缺货紧急告警
  critical_part_shortage:
    displayName: "关键配件缺货紧急告警"
    description: "关键配件缺货时升级告警"
    automationType: "event-driven"
    enabled: true

    trigger:
      type: "event"
      eventSource:
        type: "functionResult"
        functionName: "check_inventory_status"
        condition: "result == '缺货' AND is_critical == true"

    workflow:
      - step: 1
        name: "发送紧急告警"
        type: "sendNotification"
        notification:
          channel: "wechat"
          recipients:
            - "配件管理员"
            - "运营经理"
          template: "【紧急缺货】关键配件{{part_name}}({{part_number}})已缺货，请紧急采购！"

      - step: 2
        name: "短信通知"
        type: "sendNotification"
        notification:
          channel: "sms"
          recipients:
            - "配件管理员"
          template: "关键配件{{part_name}}缺货，请紧急处理。"

  # Automation 3: 滞销配件处理建议
  slow_moving_suggestion:
    displayName: "滞销配件处理建议"
    description: "识别滞销配件并建议处理"
    automationType: "event-driven"
    enabled: true

    trigger:
      type: "event"
      eventSource:
        type: "functionResult"
        functionName: "calculate_usage_frequency"
        expectedResult: "滞销"

    workflow:
      - step: 1
        name: "通知配件管理员"
        type: "sendNotification"
        notification:
          channel: "wechat"
          recipients:
            - "配件管理员"
          template: "【滞销配件】{{part_name}}({{part_number}})本月未使用，当前库存{{current_stock}}，建议促销或退货。"

  # Automation 4: 每日库存统计报告
  daily_inventory_report:
    displayName: "每日库存统计报告"
    description: "生成库存日报"
    automationType: "scheduled"
    enabled: true

    trigger:
      type: "schedule"
      schedule:
        cron: "0 9 * * *"
        timezone: "Asia/Shanghai"

    workflow:
      - step: 1
        name: "统计库存数据"
        type: "aggregateData"
        aggregation:
          - "缺货配件数量"
          - "库存不足配件数量"
          - "库存过剩配件数量"
          - "今日出库总量"

      - step: 2
        name: "生成日报"
        type: "generateReport"
        report:
          template: "daily_inventory_report"

      - step: 3
        name: "发送报告"
        type: "sendNotification"
        notification:
          channel: "email"
          recipients:
            - "配件管理员"
            - "运营经理"
          template: "库存日报"

  # Automation 5: 每周补货计划
  weekly_reorder_plan:
    displayName: "每周补货计划"
    description: "自动生成补货建议"
    automationType: "scheduled"
    enabled: true

    trigger:
      type: "schedule"
      schedule:
        cron: "0 9 * * 1"
        timezone: "Asia/Shanghai"

    workflow:
      - step: 1
        name: "计算所有配件补货需求"
        type: "callFunction"
        function: "calculate_reorder_quantity"

      - step: 2
        name: "生成补货计划"
        type: "generateReport"
        report:
          template: "weekly_reorder_plan"
          filters:
            - "reorder_quantity > 0"

      - step: 3
        name: "发送补货计划"
        type: "sendNotification"
        notification:
          channel: "email"
          recipients:
            - "配件管理员"
            - "采购专员"
          template: "本周补货计划"

  # Automation 6: 每日统计重置
  daily_stats_reset:
    displayName: "每日统计重置"
    description: "每天凌晨重置今日使用次数"
    automationType: "scheduled"
    enabled: true

    trigger:
      type: "schedule"
      schedule:
        cron: "0 0 * * *"
        timezone: "Asia/Shanghai"

    workflow:
      - step: 1
        name: "重置今日使用次数"
        type: "bulkUpdate"
        update:
          target: "today_usage_count"
          value: 0

