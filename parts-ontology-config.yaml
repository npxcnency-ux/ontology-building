  createdBy: "Ontology Builder Skill"
  createdAt: "2026-03-19"
  businessOwner: "配件管理部门"
  technicalOwner: "IT部门"
  tags:
    - "配件管理"
    - "库存管理"
    - "智能补货"

  businessContext:
    scenario: "配件库存管理，智能补货提醒，使用频次分析，成本利润分析"
    targetUsers:
      - role: "配件管理员"
        description: "管理配件库存，采购补货"
      - role: "仓管"
        description: "入库出库操作"
      - role: "技师"
        description: "查询配件，领用出库"
      - role: "采购专员"
        description: "查看补货计划，执行采购"

  dataSources:
