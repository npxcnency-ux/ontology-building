      type: "api"
      connector: "parts_system_api"
      syncSchedule: "realtime"
      mapping:
        parts_sku: "part_number"
        parts_inventory: "current_stock"

# ====================
# 7. INDEXES (索引优化)
# ====================
indexes:
  - name: "idx_part_number"
    properties:
      - "part_number"
    unique: true

  - name: "idx_part_category_status"
    properties:
      - "part_category"
      - "part_status"
    unique: false

  - name: "idx_stock_critical"
    properties:
      - "current_stock"
      - "is_critical"
    unique: false
