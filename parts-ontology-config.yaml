# Palantir Ontology Configuration
# Generated by: Ontology Builder Skill
# Object Type: 配件 (Parts)
# Generated: 2026-03-19

---
objectType:
  apiName: "parts"
  displayName: "配件"
  pluralDisplayName: "配件"
  description: "配件库存管理，价格管理，使用频次分析，智能补货"
  icon: "box"

  # 主键定义
  primaryKey:
    - "part_number"

# ====================
# 1. PROPERTIES (属性)
# ====================
properties:
  # 配件编号 - 唯一标识
  part_number:
    displayName: "配件编号"
    dataType:
      type: "string"
    required: true
    constraints:
      - "unique"

  # 配件名称
  part_name:
    displayName: "配件名称"
    dataType:
      type: "string"
    required: true

  # 配件类别
  part_category:
    displayName: "配件类别"
    dataType:
      type: "string"
      enum: ["发动机", "电池电机", "刹车系统", "悬挂系统", "空调系统", "电气系统", "内饰外饰", "轮胎轮毂", "油液滤芯", "其他"]
    required: true

  # 品牌
  brand:
    displayName: "品牌"
    dataType:
      type: "string"
    required: false

  # 适用车型
  applicable_models:
    displayName: "适用车型"
    dataType:
      type: "string"
    required: false

  # 是否关键配件
  is_critical:
    displayName: "是否关键配件"
    dataType:
      type: "boolean"
    required: true
    defaultValue: false

  # 标准单价
  standard_price:
    displayName: "标准单价(元)"
    dataType:
      type: "double"
    required: true

  # 成本价
  cost_price:
    displayName: "成本价(元)"
    dataType:
      type: "double"
    required: false

  # 供应商
  supplier:
    displayName: "供应商"
    dataType:
      type: "string"
    required: false

  # 当前库存数量
  current_stock:
    displayName: "当前库存数量"
    dataType:
      type: "integer"
    required: true
    defaultValue: 0

  # 安全库存下限
  safety_stock_min:
    displayName: "安全库存下限"
    dataType:
      type: "integer"
    required: true
    defaultValue: 5

  # 最大库存上限
  max_stock_limit:
    displayName: "最大库存上限"
    dataType:
      type: "integer"
    required: true
    defaultValue: 100

  # 仓库位置
  warehouse_location:
    displayName: "仓库位置"
    dataType:
      type: "string"
    required: false

  # 今日使用次数
  today_usage_count:
    displayName: "今日使用次数"
    dataType:
      type: "integer"
    required: false
    defaultValue: 0

  # 本周使用次数
  week_usage_count:
    displayName: "本周使用次数"
    dataType:
      type: "integer"
    required: false
    defaultValue: 0

  # 本月使用次数
  month_usage_count:
    displayName: "本月使用次数"
    dataType:
      type: "integer"
    required: false
    defaultValue: 0

  # 累计使用次数
  total_usage_count:
    displayName: "累计使用次数"
    dataType:
      type: "integer"
    required: false
    defaultValue: 0

  # 上次入库日期
  last_stock_in_date:
    displayName: "上次入库日期"
    dataType:
      type: "date"
    required: false

  # 上次出库日期
  last_stock_out_date:
    displayName: "上次出库日期"
    dataType:
      type: "date"
    required: false

  # 配件状态
  part_status:
    displayName: "配件状态"
    dataType:
      type: "string"
      enum: ["在售", "缺货", "停产", "待检"]
    required: true
    defaultValue: "在售"

  # 保质期(天)
  shelf_life_days:
    displayName: "保质期(天)"
    dataType:
      type: "integer"
    required: false

  # 备注
  notes:
    displayName: "备注"
    dataType:
      type: "string"
    required: false

  # 创建时间
  created_time:
    displayName: "创建时间"
    dataType:
      type: "timestamp"
    required: true

  # 更新时间
  updated_time:
    displayName: "更新时间"
    dataType:
      type: "timestamp"
    required: false

# ====================
# 2. FUNCTIONS (计算规则)
# ====================
functions:
  # Function 1: 库存状态判断
  check_inventory_status:
    displayName: "库存状态"
    description: "根据当前库存判断状态"

    parameters:
      current_stock:
        dataType: "integer"
        description: "当前库存"
      safety_stock_min:
        dataType: "integer"
        description: "安全库存下限"
      max_stock_limit:
        dataType: "integer"
        description: "最大库存上限"
      is_critical:
        dataType: "boolean"
        description: "是否关键配件"

    returnType:
      type: "string"
      enum: ["充足", "正常", "库存不足", "缺货", "库存过剩"]

    logic: |
      # 判断库存状态
      if current_stock == 0:
          return "缺货"
      elif current_stock < safety_stock_min:
          if is_critical:
              return "缺货"  # 关键配件低于安全库存视为缺货
          else:
              return "库存不足"
      elif current_stock > max_stock_limit:
          return "库存过剩"
      elif current_stock > safety_stock_min * 2:
          return "充足"
      else:
          return "正常"

    usageScenarios:
      - "库存管理看板"
      - "触发补货告警"
      - "工单创建时库存检查"

  # Function 2: 建议补货数量
  calculate_reorder_quantity:
    displayName: "建议补货数量"
    description: "根据使用频次和库存计算建议补货数量"

    parameters:
      current_stock:
        dataType: "integer"
        description: "当前库存"
      month_usage_count:
        dataType: "integer"
        description: "本月使用次数"
      max_stock_limit:
        dataType: "integer"
        description: "最大库存上限"

    returnType:
      type: "integer"

    logic: |
      # 预测未来30天需求
      estimated_demand = month_usage_count

      # 目标库存 = 预测需求 × 1.2 (20%安全余量)
      target_stock = int(estimated_demand * 1.2)

      # 限制不超过最大库存
      target_stock = min(target_stock, max_stock_limit)

      # 建议补货数量
      reorder_qty = max(0, target_stock - current_stock)

      return reorder_qty

    usageScenarios:
      - "自动生成补货计划"
      - "采购建议"

  # Function 3: 使用频率等级
  calculate_usage_frequency:
    displayName: "使用频率等级"
    description: "根据使用次数评估配件热度"

    parameters:
      month_usage_count:
        dataType: "integer"
        description: "本月使用次数"

    returnType:
      type: "string"
      enum: ["高频", "中频", "低频", "滞销"]

    logic: |
      if month_usage_count >= 20:
          return "高频"
      elif month_usage_count >= 10:
          return "中频"
      elif month_usage_count >= 1:
          return "低频"
      else:
          return "滞销"

    usageScenarios:
      - "配件ABC分类"
      - "库存优化建议"
      - "滞销配件处理"

  # Function 4: 利润率计算
  calculate_profit_margin:
    displayName: "利润率"
    description: "计算配件销售利润率"

    parameters:
      standard_price:
        dataType: "double"
        description: "标准单价"
      cost_price:
        dataType: "double"
        description: "成本价"

    returnType:
      type: "double"

    logic: |
      if cost_price == 0 or cost_price is None:
          return 0.0

      # 利润率 = (售价 - 成本) / 售价 × 100%
      margin = ((standard_price - cost_price) / standard_price) * 100

      return round(margin, 2)

    usageScenarios:
      - "利润分析"
      - "定价策略优化"

  # Function 5: 库存周转率
  calculate_inventory_turnover:
    displayName: "库存周转率"
    description: "评估配件库存周转速度"

    parameters:
      month_usage_count:
        dataType: "integer"
        description: "本月使用次数"
      current_stock:
        dataType: "integer"
        description: "当前库存"

    returnType:
      type: "double"

    logic: |
      if current_stock == 0:
          return 0.0

      # 周转率 = 月使用量 / 平均库存
      # 简化计算: 使用当前库存作为平均库存
      turnover = month_usage_count / current_stock

      return round(turnover, 2)

    usageScenarios:
      - "库存效率分析"
      - "资金周转优化"

# ====================
# 3. ACTIONS (操作)
# ====================
actions:
