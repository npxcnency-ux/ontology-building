# Ontology Configuration
# Generated by: Ontology Builder Skill
# Scenario: {{business_scenario}}
# Object Types: {{object_count}} (1 core + {{skeleton_count}} skeleton)

---
# ============================================================
# CORE OBJECT TYPE: {{object_type_name}} (完整配置)
# ============================================================
objectTypes:
  - apiName: "{{object_type_api_name}}"
    displayName: "{{object_type_display_name}}"
    pluralDisplayName: "{{object_type_plural_name}}"
    description: "{{object_type_description}}"
    icon: "{{object_icon}}"  # 可选: gear, box, user, building, etc.
    isCoreObject: true  # 标记为本次建模的核心对象

    # 主键定义
    primaryKey:
      - "{{primary_key_property}}"

# ====================
# 1. PROPERTIES (属性)
# ====================
properties:
{{#each properties}}
  # {{description}}
  {{api_name}}:
    displayName: "{{display_name}}"
    dataType:
      type: "{{data_type}}"  # string, integer, double, date, timestamp, boolean, etc.
{{#if data_type_options}}
      {{data_type_options}}
{{/if}}
{{#if is_timeseries}}
    # 时序属性配置
    timeSeries: true
    timeSeriesConfiguration:
      retentionPolicy:
        duration: "{{retention_duration}}"  # 如: "P30D" (30天), "P1Y" (1年)
{{/if}}
{{#if constraints}}
    constraints:
{{#each constraints}}
      - {{this}}
{{/each}}
{{/if}}
{{#if default_value}}
    defaultValue: {{default_value}}
{{/if}}
{{#if data_source}}
    # 数据来源
    dataSource:
      origin: "{{data_source_type}}"  # manual, external_sync, auto_generated
{{#if data_source_system}}
      sourceSystem: "{{data_source_system}}"
      syncFrequency: "{{sync_frequency}}"  # realtime, hourly, daily
{{/if}}
{{/if}}
    required: {{required}}

{{/each}}

# ====================
# 2. FUNCTIONS (计算规则)
# ====================
functions:
{{#each functions}}
  # Function: {{description}}
  {{api_name}}:
    displayName: "{{display_name}}"
    description: "{{detailed_description}}"

    # 输入参数
    parameters:
{{#each parameters}}
      {{param_name}}:
        dataType: "{{param_type}}"
        description: "{{param_description}}"
{{/each}}

    # 返回类型
    returnType:
      type: "{{return_type}}"
{{#if return_type_options}}
      {{return_type_options}}
{{/if}}

    # 计算逻辑 (Python代码)
    logic: |
      {{logic_code}}

    # 使用场景标记
    usageScenarios:
{{#each usage_scenarios}}
      - "{{this}}"
{{/each}}

{{/each}}

# ====================
# 3. ACTIONS (操作)
# ====================
actions:
{{#each actions}}
  # Action: {{description}}
  {{api_name}}:
    displayName: "{{display_name}}"
    description: "{{detailed_description}}"
    actionType: "{{action_type}}"  # create, update, delete, custom

    # 输入参数
    parameters:
{{#each parameters}}
      {{param_name}}:
        dataType: "{{param_type}}"
        displayName: "{{param_display_name}}"
        description: "{{param_description}}"
        required: {{param_required}}
{{#if param_default}}
        default: {{param_default}}
{{/if}}
{{#if param_validation}}
        validation:
{{#each param_validation}}
          - {{this}}
{{/each}}
{{/if}}
{{/each}}

{{#if preconditions}}
    # 前置条件
    preconditions:
{{#each preconditions}}
      - condition: "{{condition_expression}}"
        errorMessage: "{{error_message}}"
{{/each}}
{{/if}}

    # 执行逻辑
    operations:
{{#each operations}}
      - type: "{{operation_type}}"  # setProperty, callFunction, createObject, etc.
        target: "{{operation_target}}"
{{#if operation_params}}
        parameters:
{{#each operation_params}}
          {{key}}: {{value}}
{{/each}}
{{/if}}
{{/each}}

{{#if permissions}}
    # 权限控制
    permissions:
      roles:
{{#each permissions.roles}}
        - "{{role_name}}"{{#if role_conditions}} # 条件: {{role_conditions}}{{/if}}
{{/each}}
{{#if permissions.conditions}}
      conditions:
{{#each permissions.conditions}}
        - "{{this}}"
{{/each}}
{{/if}}
{{/if}}

{{#if confirmation_required}}
    # 二次确认
    confirmation:
      required: true
      message: "{{confirmation_message}}"
{{/if}}

{{#if write_back}}
    # 回写到源系统
    writeBack:
      enabled: true
      connector: "{{connector_name}}"
      mapping:
{{#each write_back.mappings}}
        {{source_field}}: "{{target_field}}"
{{/each}}
{{/if}}

{{/each}}

# ====================
# 4. AUTOMATIONS (自动化规则)
# ====================
automations:
{{#each automations}}
  # Automation: {{description}}
  {{api_name}}:
    displayName: "{{display_name}}"
    description: "{{detailed_description}}"
    automationType: "{{automation_type}}"  # event-driven, scheduled
    enabled: true

{{#if trigger_type_event}}
    # 事件驱动触发
    trigger:
      type: "event"
      eventSource:
        type: "{{event_source_type}}"  # propertyChange, actionExecuted, functionResult
{{#if event_source_type_property}}
        propertyName: "{{property_name}}"
        condition: "{{condition_expression}}"  # 如: "value > 90"
{{/if}}
{{#if event_source_type_action}}
        actionName: "{{action_name}}"
{{/if}}
{{#if event_source_type_function}}
        functionName: "{{function_name}}"
        expectedResult: "{{expected_result}}"  # 如: "高风险"
{{/if}}
{{/if}}

{{#if trigger_type_schedule}}
    # 定时触发
    trigger:
      type: "schedule"
      schedule:
        cron: "{{cron_expression}}"  # 如: "0 8 * * *" (每天早上8点)
        timezone: "{{timezone}}"  # 如: "Asia/Shanghai"
{{/if}}

    # 执行流程
    workflow:
{{#each workflow_steps}}
      - step: {{@index}}
        name: "{{step_name}}"
        type: "{{step_type}}"  # callAction, callFunction, sendNotification, createObject, updateObject, query, wait, conditional
{{#if step_type_action}}
        action: "{{action_name}}"
        parameters:
{{#each action_parameters}}
          {{key}}: {{value}}
{{/each}}
{{/if}}
{{#if step_type_notification}}
        notification:
          channel: "{{notification_channel}}"  # email, sms, wechat, slack
          recipients:
{{#each notification_recipients}}
            - "{{this}}"
{{/each}}
          template: "{{notification_template}}"
{{/if}}
{{#if step_type_conditional}}
        condition: "{{condition_expression}}"
        ifTrue:
{{#each if_true_steps}}
          - {{this}}
{{/each}}
{{#if if_false_steps}}
        ifFalse:
{{#each if_false_steps}}
          - {{this}}
{{/each}}
{{/if}}
{{/if}}
{{/each}}

{{#if error_handling}}
    # 错误处理
    errorHandling:
      strategy: "{{error_strategy}}"  # retry, notify, stop
{{#if error_strategy_retry}}
      retryConfig:
        maxAttempts: {{max_retry_attempts}}
        backoffSeconds: {{backoff_seconds}}
{{/if}}
      notifyOnFailure:
{{#each failure_notification_recipients}}
        - "{{this}}"
{{/each}}
{{/if}}

{{#if rate_limiting}}
    # 限流配置 (避免频繁触发)
    rateLimiting:
      maxExecutionsPerHour: {{max_executions_per_hour}}
      cooldownMinutes: {{cooldown_minutes}}  # 两次执行之间的最小间隔
{{/if}}

{{/each}}

# ====================
# 5. LINKS (关联关系)
# ====================
{{#if links}}
links:
{{#each links}}
  # Link: {{description}}
  {{link_api_name}}:
    displayName: "{{link_display_name}}"
    targetObjectType: "{{target_object_type}}"
    linkType: "{{link_type}}"  # oneToOne, oneToMany, manyToMany
    description: "{{link_description}}"
    onDelete: "{{on_delete_behavior}}"  # cascade(一起删除), setNull(清空关联), restrict(阻止删除)

{{/each}}
{{/if}}

# ====================
# 6. METADATA (元数据)
# ====================
metadata:
  version: "1.0.0"
  createdBy: "Ontology Builder Skill"
  createdAt: "{{creation_timestamp}}"
  businessOwner: "{{business_owner}}"
  technicalOwner: "{{technical_owner}}"
  tags:
{{#each tags}}
    - "{{this}}"
{{/each}}

  # 业务场景说明
  businessContext:
    scenario: "{{business_scenario}}"
    targetUsers:
{{#each target_users}}
      - role: "{{user_role}}"
        description: "{{user_description}}"
{{/each}}

  # 数据源映射 (如果从外部系统同步数据)
{{#if data_sources}}
  dataSources:
{{#each data_sources}}
    - name: "{{source_name}}"
      type: "{{source_type}}"  # database, api, file
      connector: "{{connector_name}}"
      syncSchedule: "{{sync_schedule}}"
      mapping:
{{#each source_mapping}}
        {{source_field}}: "{{target_property}}"
{{/each}}
{{/each}}
{{/if}}

# ====================
# 7. VALIDATION RULES (全局校验规则) - 自动推断，无需用户配置
# ====================
# 以下校验规则根据Property约束、Action前置条件和Function逻辑自动推断：
# - 必填字段(required=true)的非空校验
# - 枚举字段的值范围校验
# - Action前置条件转化为全局校验
validationRules:
{{#each required_properties}}
  - name: "validate_{{this}}_required"
    description: "{{this}}为必填字段，不能为空"
    condition: "{{this}} != null"
    errorMessage: "{{this}}不能为空"
    severity: "error"
{{/each}}
{{#each enum_properties}}
  - name: "validate_{{this}}_enum"
    description: "{{this}}必须为预定义的枚举值之一"
    condition: "{{this}} in allowed_values"
    errorMessage: "{{this}}的值不在允许范围内"
    severity: "error"
{{/each}}

# ====================
# 8. INDEXES (索引优化) - 自动推断，无需用户配置
# ====================
# 以下索引根据Property定义自动推断：
# - primaryKey字段 → 唯一索引
# - 标记为isSearchable的字段 → 普通索引
# - 枚举类型(Enum)字段 → 普通索引（常用于筛选）
# - 关联关系(Links)的外键字段 → 普通索引（加速关联查询）
indexes:
  - name: "idx_primary_key"
    properties:
      - "{{primary_key_field}}"
    unique: true
{{#each searchable_properties}}
  - name: "idx_{{this}}"
    properties:
      - "{{this}}"
    unique: false
{{/each}}
{{#each enum_properties}}
  - name: "idx_{{this}}"
    properties:
      - "{{this}}"
    unique: false
{{/each}}

# ============================================================
# SKELETON OBJECT TYPES (关联对象骨架配置)
# ============================================================
# 以下对象来自阶段一的对象全景图，仅包含基本字段和关联关系。
# 后续可对每个对象重复阶段二到五流程，逐步完善。
{{#each skeleton_objects}}

  # ------------------------------------------------------------
  # SKELETON: {{display_name}} (骨架配置，待后续完善)
  # ------------------------------------------------------------
  - apiName: "{{api_name}}"
    displayName: "{{display_name}}"
    description: "{{description}}"
    isCoreObject: false  # 骨架对象，待后续迭代完善

    primaryKey:
      - "{{primary_key}}"

    properties:
{{#each properties}}
      {{api_name}}:
        displayName: "{{display_name}}"
        dataType:
          type: "{{data_type}}"
        required: {{required}}
{{/each}}

    links:
{{#each links}}
      {{link_api_name}}:
        displayName: "{{link_display_name}}"
        targetObjectType: "{{target_object_type}}"
        linkType: "{{link_type}}"
        onDelete: "{{on_delete_behavior}}"
{{/each}}

{{/each}}
